<head>
<style type="text/css">

color: #373737;

@font-face {
    font-family: 'Game Over Regular';

body {background-color: #000000}

  height: 95%;

  margin-right: auto;

  /*IMPORTANTE*/

  width: 500px;  
  height: auto;

footer {   
  position: relative;       
  width: 100%;  
  height: auto;

  font: bold 90% monospace;    
  color: #373737;    
  width: 100%;  
  height: auto;    
  text-align: center;

  font-family: 'Game Over Regular';

<script type="text/javascript">

	/*function detenerse()
	{
		clearInterval(cronometro);
	}*/

	var timeout=0;
	var year=0;
	var day=0;

    function funcionando()
    {

      var today = new Date("December 03, 2019 10:00:00").getTime();
      var actual = new Date().getTime();
      var diff=new Date(actual-today);
      var aux = (diff/(1000*60*60*24)).toString();

      // mostramos la diferencia entre la fecha actual y la inicial
      var day=aux.substr(0,aux.indexOf('.')); 
      var hours=LeadingZero(diff.getUTCHours());
      var minutes=LeadingZero(diff.getUTCMinutes());
      var seconds=LeadingZero(diff.getUTCSeconds());

    	if(day==365)
    	{
    		year++;
    		day = 0;  
    	}       

      document.getElementById('horas').innerHTML = hours+'h';
      document.getElementById('minutos').innerHTML = minutes+'m';
      document.getElementById('segundos').innerHTML = seconds+'s';
      document.getElementById('dias').innerHTML = day+'d';

      // Indicamos que se ejecute esta función nuevamente dentro de 1 segundo
      timeout=setTimeout("funcionando()",1000);
    }
 
    /* Funcion que pone un 0 delante de un valor si es necesario */
    function LeadingZero(Time)
    {
        return (Time < 10) ? "0" + Time : + Time;
    }
 
    window.onload=function()
    {
        funcionando();
    }

</script>

</head>
<body>

<div class="padre">
  <div class="hijo">
  	<div align="center">
	<p><span id="dias">0d</span></p>
	<p><span id="horas">0h</span>
       <span>:</span>
       <span id="minutos">0m</span>
       <span>:</span>
       <span id="segundos">0s</span></p>      
      </div>     
	</div>
</div>
<footer><p class="enlace"><a href="https://sebascabero.com" target="_blank">sebascabero.com</a></p></footer>
